# AXORA Configuration File
# Copy this file to ~/.config/axora/axora.toml

# ─────────────────────────────────────────────────────────────
# SERVER CONFIGURATION
# ─────────────────────────────────────────────────────────────
[server]
bind_address = "127.0.0.1"
port = 50051

# ─────────────────────────────────────────────────────────────
# DATABASE CONFIGURATION
# ─────────────────────────────────────────────────────────────
[database]
path = "~/.local/share/axora/axora.db"
wal_mode = true
busy_timeout_ms = 5000

# ─────────────────────────────────────────────────────────────
# AGENT CONFIGURATION
# ─────────────────────────────────────────────────────────────
[agents]
max_concurrent_agents = 10
frame_duration_ms = 16  # ~60 FPS
health_check_interval_seconds = 30

# ─────────────────────────────────────────────────────────────
# MODEL CONFIGURATION
# ─────────────────────────────────────────────────────────────
[models]
default_provider = "ollama"
default_model = "qwen2.5-coder:7b"

# Ollama (Local)
[models.ollama]
base_url = "http://localhost:11434"
# api_key = ""  # Ollama doesn't require API key

# OpenAI
[models.openai]
base_url = "https://api.openai.com/v1"
api_key = "sk-..."  # Or set OPENAI_API_KEY environment variable
default_model = "gpt-4"

# Anthropic
[models.anthropic]
base_url = "https://api.anthropic.com/v1"
api_key = "sk-ant-..."  # Or set ANTHROPIC_API_KEY environment variable
default_model = "claude-3-sonnet-20240229"

# Chinese Providers (OpenAI-compatible)
[models.deepseek]
base_url = "https://api.deepseek.com"
api_key = "sk-..."  # Get from https://platform.deepseek.com
default_model = "deepseek-chat"

[models.qwen]
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = "sk-..."  # Get from Alibaba Cloud
default_model = "qwen-turbo"

[models.moonshot]
base_url = "https://api.moonshot.cn/v1"
api_key = "sk-..."  # Get from https://platform.moonshot.cn
default_model = "moonshot-v1-8k"

# ─────────────────────────────────────────────────────────────
# TOKEN LIMITS
# ─────────────────────────────────────────────────────────────
[tokens]
max_tokens_per_request = 4096
max_context_tokens = 8192
token_budget_per_session = 100000

# ─────────────────────────────────────────────────────────────
# UI CONFIGURATION
# ─────────────────────────────────────────────────────────────
[ui]
theme = "dark"  # Options: "light", "dark", "system"
language = "pt-BR"  # Options: "en", "pt-BR", "es"
sidebar_width = 300
font_size = 14

# ─────────────────────────────────────────────────────────────
# ADVANCED CONFIGURATION
# ─────────────────────────────────────────────────────────────
[advanced]
enable_logging = true
log_level = "info"  # Options: "debug", "info", "warn", "error"
auto_update = true
telemetry_enabled = false  # Set to true to help improve AXORA

# ─────────────────────────────────────────────────────────────
# WORKER POOL CONFIGURATION
# ─────────────────────────────────────────────────────────────
[worker_pool]
min_workers = 2
max_workers = 10
idle_timeout_seconds = 300

# ─────────────────────────────────────────────────────────────
# MEMORY CONFIGURATION
# ─────────────────────────────────────────────────────────────
[memory]
max_episodic_memories = 1000
max_semantic_memories = 5000
consolidation_interval_minutes = 60
enable_memgas = true
