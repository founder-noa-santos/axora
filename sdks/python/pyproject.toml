[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axora-logger"
version = "0.1.0"
description = "AXORA Wide Event SDK for Python"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/axora_logger"]

[tool.pytest.ini_options]
testpaths = ["tests"]
