[package]
name = "axora-desktop"
version = "0.1.0"
description = "AXORA Desktop Application"
authors = ["AXORA Team <team@axora.dev>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/axora/axora-mvp"
edition = "2021"
rust-version = "1.75"

[build-dependencies]
tauri-build = { version = "2.0.0-alpha", features = [] }

[dependencies]
tauri = { version = "2.0.0-alpha", features = [] }
tauri-plugin-shell = "2.0.0-alpha"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

axora-proto = { path = "../../../crates/axora-proto" }
axora-core = { path = "../../../crates/axora-core" }

[features]
custom-protocol = ["tauri/custom-protocol"]
