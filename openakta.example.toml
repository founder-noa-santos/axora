# api_key_file = ".openakta/secrets/brave_api_key"
#
# [research.exa]
# api_key_file = ".openakta/secrets/exa_api_key"
# # type = "neural"   # Exa search type (e.g. neural, keyword)
#
# [research.serper]
# api_key_file = ".openakta/secrets/serper.key"
#
# [research.tavily]
# api_key_file = ".openakta/secrets/tavily.key"
