name: akta-docs

concurrency:
  group: akta-docs-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "sdks/akta-docs/**"
      - "crates/openakta-docs/**"
      - ".github/workflows/akta-docs-ci.yml"
  push:
    branches: [main]
    paths:
      - "sdks/akta-docs/**"
      - "crates/openakta-docs/**"
      - ".github/workflows/akta-docs-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  typescript:
    name: TypeScript (reference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: verify
        working-directory: sdks/akta-docs/typescript
        run: |
          npm ci
          npm run verify

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: verify
        working-directory: sdks/akta-docs/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check src tests
          ruff format --check src tests
          python -m pytest
          python -m build

  java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: verify
        working-directory: sdks/akta-docs/java
        run: |
          mvn --no-transfer-progress -q clean test

  csharp:
    name: C#
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            7.0.x
            8.0.x
      - name: verify
        working-directory: sdks/akta-docs/csharp
        run: |
          dotnet restore AktaDocs.sln
          dotnet build AktaDocs.sln --configuration Debug
          dotnet test AktaDocs.sln --configuration Debug --no-build

  rust-fixtures:
    name: Rust (openakta-docs + fixtures)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: akta-docs-openakta-docs
      - name: fmt
        run: cargo fmt -p openakta-docs -- --check
      - name: clippy
        run: cargo clippy -p openakta-docs --all-targets --all-features --locked -- -D warnings
      - name: test
        run: cargo test -p openakta-docs --locked
