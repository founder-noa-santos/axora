name: Rust CI

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # MSRV gate: compile-only, parallel with main job. Must match [workspace.package].rust-version and rust-toolchain.toml.
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: msrv-1.94
      - name: cargo check (MSRV)
        run: cargo check --workspace --all-targets --all-features --locked

  deny:
    name: cargo deny (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  quality:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: verify test taxonomy
        run: bash scripts/qa/verify_test_taxonomy.sh

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      # Default suite excludes #[ignore] slow tests (see openakta-agents executor/worker_pool).
      - name: tests
        run: cargo test --workspace --all-features --locked

  # Full coverage on main: run ignored (slow) tests after the fast suite passes.
  slow-tests:
    name: slow (ignored) tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: slow-tests
      - name: ignored tests only
        run: cargo test --workspace --all-features --locked -- --ignored

  # Packaged artifact validation: verify sqlite-vec works in clean environment
  # This ensures end users don't need to manually install sqlite-vec
  packaged-artifact-validation:
    name: packaged artifact validation (sqlite-vec)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build release artifacts
        run: cargo build --release -p openakta-cli -p openakta-daemon --locked
      
      - name: Verify no external sqlite-vec dependency (linkage audit)
        shell: bash
        run: |
          echo "=== Checking for external sqlite-vec dependencies ==="
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            echo "Running otool -L on openakta-cli..."
            otool -L target/release/openakta | grep -i "sqlite_vec" && exit 1 || true
            otool -L target/release/openakta-daemon | grep -i "sqlite_vec" && exit 1 || true
            echo "✓ No external sqlite_vec dylib found (static linking confirmed)"
          else
            echo "Running ldd on openakta-cli..."
            ldd target/release/openakta | grep -i "sqlite_vec" && exit 1 || true
            ldd target/release/openakta-daemon | grep -i "sqlite_vec" && exit 1 || true
            echo "✓ No external sqlite_vec so found (static linking confirmed)"
          fi
      
      - name: Clean environment smoke test
        shell: bash
        run: |
          echo "=== Running sqlite-vec smoke test in clean environment ==="
          # Ensure no user-installed sqlite-vec libs are present
          rm -rf ~/.local/lib/sqlite_vec* 2>/dev/null || true
          
          # Run the canonical init test via cargo test
          cargo test -p openakta-memory test_ensure_sqlite_vec_ready_two_tier_verification --release -- --nocapture
          
          echo "✓ Packaged artifacts pass sqlite-vec verification"
