name: Publish Python SDKs

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and publish package
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          PACKAGE_DIR="${GITHUB_REF_NAME%@*}"
          python -m pip install --upgrade pip hatch twine
          cd "${PACKAGE_DIR}"
          hatch build
          twine upload dist/*
