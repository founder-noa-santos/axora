# Local manual testing via OpenRouter (OpenAI-compatible).
# API key file: .openakta/secrets/openrouter.key (do not commit)
# Endpoint: https://openrouter.ai/api/v1

fallback_policy = "never"
routing_enabled = false
local_validation_retry_budget = 1

# Remote model registry - authoritative provider and model metadata
[remote_registry]
url = "https://openakta.github.io/data-artifacts/providers/v1.json"
http_timeout_secs = 10


[providers]
default_local_instance = "local"

[providers.instances.local]
profile = "open_ai_compatible"
base_url = "https://openrouter.ai/api/v1"
is_local = true
default_model = "openai/gpt-4o-mini"
label = "OpenRouter"

[providers.instances.local.secret]
api_key_file = ".openakta/secrets/openrouter.key"

[[registry_models]]
name = "openai/gpt-4o-mini"
max_context_window = 128000
max_output_tokens = 16384
preferred_instance = "local"
