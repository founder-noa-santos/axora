[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openakta-logger-posthog"
version = "0.1.0"
description = "OPENAKTA Wide Event PostHog adapter for Python"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = ["openakta-logger==0.1.0", "posthog>=3.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/openakta_logger_posthog"]
