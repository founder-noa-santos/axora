[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openakta-logger-otel"
version = "0.1.0"
description = "OPENAKTA Wide Event OpenTelemetry adapter for Python"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = ["openakta-logger==0.1.0", "opentelemetry-api>=1.24.0", "opentelemetry-sdk>=1.24.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/openakta_logger_otel"]
