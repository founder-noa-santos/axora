[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openakta-logger-sentry"
version = "0.1.0"
description = "OPENAKTA Wide Event Sentry adapter for Python"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = ["openakta-logger==0.1.0", "sentry-sdk>=2.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/openakta_logger_sentry"]
