[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axora-logger-datadog"
version = "0.1.0"
description = "AXORA Wide Event Datadog adapter for Python"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = ["axora-logger==0.1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/axora_logger_datadog"]
