# cargo-deny — https://embarkstudios.github.io/cargo-deny/
# CI runs: cargo deny check advisories
# Optional locally: cargo deny check licenses  (add a [licenses] section when ready)

[advisories]
# Vulnerability advisories always fail unless listed in `ignore`.
# Unmaintained: only direct workspace deps (softer than `all`).
unmaintained = "workspace"
yanked = "warn"

# async-nats pulls `rustls-webpki ^0.102`; latest 0.102.x is still flagged by RUSTSEC-2026-0049.
# Remove when upstream takes `rustls-webpki` 0.103+ or publishes a fixed 0.102.x.
ignore = [
  { id = "RUSTSEC-2026-0049", reason = "blocked on async-nats rustls-webpki ^0.102 (no patched 0.102.x on crates.io)" },
]
