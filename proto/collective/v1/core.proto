syntax = "proto3";

package collective.v1;

option go_package = "github.com/axora/axora-mvp/proto/collective/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Core service for agent management and coordination
service CollectiveService {
  // Agent lifecycle
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
  rpc UnregisterAgent(UnregisterAgentRequest) returns (google.protobuf.Empty);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  
  // Task management
  rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  
  // Message streaming
  rpc StreamMessages(StreamMessagesRequest) returns (stream Message);
  rpc SendMessage(SendMessageRequest) returns (google.protobuf.Empty);
}

// Agent represents a coding agent in the system
message Agent {
  string id = 1;
  string name = 2;
  string role = 3;
  AgentStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  map<string, string> metadata = 7;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_IDLE = 1;
  AGENT_STATUS_BUSY = 2;
  AGENT_STATUS_OFFLINE = 3;
}

// Task represents a unit of work
message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  TaskStatus status = 4;
  string assignee_id = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp completed_at = 8;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_COMPLETED = 3;
  TASK_STATUS_FAILED = 4;
}

// Message for inter-agent communication
message Message {
  string id = 1;
  string sender_id = 2;
  string recipient_id = 3;
  MessageType message_type = 4;
  string content = 5;
  google.protobuf.Timestamp timestamp = 6;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_COMMAND = 2;
  MESSAGE_TYPE_RESULT = 3;
  MESSAGE_TYPE_STATUS = 4;
}

// Request/Response messages
message RegisterAgentRequest {
  string name = 1;
  string role = 2;
  map<string, string> metadata = 3;
}

message RegisterAgentResponse {
  Agent agent = 1;
}

message UnregisterAgentRequest {
  string agent_id = 1;
}

message ListAgentsRequest {
  AgentStatus filter_status = 1;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
}

message SubmitTaskRequest {
  string title = 1;
  string description = 2;
  string assignee_id = 3;
}

message SubmitTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string task_id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

message ListTasksRequest {
  TaskStatus filter_status = 1;
  string assignee_id = 2;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message StreamMessagesRequest {
  string agent_id = 1;
}

message SendMessageRequest {
  string sender_id = 1;
  string recipient_id = 2;
  MessageType message_type = 3;
  string content = 4;
}
