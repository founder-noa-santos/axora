syntax = "proto3";

package collective.v1;

option go_package = "github.com/openakta/aktacode/proto/collective/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Core service for agent management and coordination
service CollectiveService {
  // Agent lifecycle
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
  rpc UnregisterAgent(UnregisterAgentRequest) returns (google.protobuf.Empty);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  
  // Task management
  rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  
  // Message streaming
  rpc StreamMessages(StreamMessagesRequest) returns (stream Message);
  rpc SendMessage(SendMessageRequest) returns (google.protobuf.Empty);
  /// Authoritative HITL answer ingestion (drives MissionHitlGate + blackboard wake).
  rpc SubmitHitlAnswer(SubmitHitlAnswerRequest) returns (SubmitHitlAnswerResponse);
}

// Agent represents a coding agent in the system
message Agent {
  string id = 1;
  string name = 2;
  string role = 3;
  AgentStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  map<string, string> metadata = 7;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_IDLE = 1;
  AGENT_STATUS_BUSY = 2;
  AGENT_STATUS_OFFLINE = 3;
}

// Task represents a unit of work
message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  TaskStatus status = 4;
  string assignee_id = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp completed_at = 8;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_COMPLETED = 3;
  TASK_STATUS_FAILED = 4;
}

// Message for inter-agent communication
message Message {
  string id = 1;
  string sender_id = 2;
  string recipient_id = 3;
  MessageType message_type = 4;
  string content = 5;
  google.protobuf.Timestamp timestamp = 6;
  PatchEnvelope patch = 7;
  PatchReceipt patch_receipt = 8;
  ContextPack context_pack = 9;
  ValidationResult validation_result = 10;
  TaskAssignment task_assignment = 11;
  ProgressUpdate progress_update = 12;
  ResultSubmission result_submission = 13;
  BlockerAlert blocker_alert = 14;
  WorkflowTransitionEvent workflow_transition = 15;
  QuestionEnvelope human_question = 16;
  AnswerEnvelope human_answer = 17;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_COMMAND = 2;
  MESSAGE_TYPE_RESULT = 3;
  MESSAGE_TYPE_STATUS = 4;
  MESSAGE_TYPE_PATCH = 5;
  MESSAGE_TYPE_PATCH_RESULT = 6;
  MESSAGE_TYPE_CONTEXT_PACK = 7;
  MESSAGE_TYPE_VALIDATION_RESULT = 8;
  MESSAGE_TYPE_TASK_ASSIGNMENT = 9;
  MESSAGE_TYPE_PROGRESS_UPDATE = 10;
  MESSAGE_TYPE_RESULT_SUBMISSION = 11;
  MESSAGE_TYPE_BLOCKER_ALERT = 12;
  MESSAGE_TYPE_WORKFLOW_TRANSITION = 13;
  MESSAGE_TYPE_QUESTION = 14;
  MESSAGE_TYPE_ANSWER = 15;
}

/// How a QuestionEnvelope expects input.
enum QuestionKind {
  QUESTION_KIND_UNSPECIFIED = 0;
  QUESTION_KIND_SINGLE = 1;
  QUESTION_KIND_MULTI = 2;
  QUESTION_KIND_FREE_TEXT = 3;
  QUESTION_KIND_MIXED = 4;
}

/// Authoritative mode on an AnswerEnvelope (mirrors QuestionKind).
enum AnswerMode {
  ANSWER_MODE_UNSPECIFIED = 0;
  ANSWER_MODE_SINGLE = 1;
  ANSWER_MODE_MULTI = 2;
  ANSWER_MODE_FREE_TEXT = 3;
  ANSWER_MODE_MIXED = 4;
}

/// Who produced the answer.
enum AnswerAuthor {
  ANSWER_AUTHOR_UNSPECIFIED = 0;
  ANSWER_AUTHOR_HUMAN = 1;
  ANSWER_AUTHOR_SYSTEM = 2;
}

/// High-level mission lifecycle for HITL coordination (parallel to task state).
enum MissionLifecycleState {
  MISSION_LIFECYCLE_STATE_UNSPECIFIED = 0;
  MISSION_LIFECYCLE_STATE_RUNNING = 1;
  MISSION_LIFECYCLE_STATE_PENDING_ANSWER = 2;
  MISSION_LIFECYCLE_STATE_CANCELLED = 3;
  MISSION_LIFECYCLE_STATE_TIMED_OUT = 4;
  MISSION_LIFECYCLE_STATE_COMPLETED = 5;
}

// Request/Response messages
message RegisterAgentRequest {
  string name = 1;
  string role = 2;
  map<string, string> metadata = 3;
}

message RegisterAgentResponse {
  Agent agent = 1;
}

message UnregisterAgentRequest {
  string agent_id = 1;
}

message ListAgentsRequest {
  AgentStatus filter_status = 1;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
}

message SubmitTaskRequest {
  string title = 1;
  string description = 2;
  string assignee_id = 3;
}

message SubmitTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string task_id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

message ListTasksRequest {
  TaskStatus filter_status = 1;
  string assignee_id = 2;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message StreamMessagesRequest {
  string agent_id = 1;
}

message SendMessageRequest {
  string sender_id = 1;
  string recipient_id = 2;
  MessageType message_type = 3;
  string content = 4;
  PatchEnvelope patch = 5;
  PatchReceipt patch_receipt = 6;
  ContextPack context_pack = 7;
  ValidationResult validation_result = 8;
  TaskAssignment task_assignment = 9;
  ProgressUpdate progress_update = 10;
  ResultSubmission result_submission = 11;
  BlockerAlert blocker_alert = 12;
  WorkflowTransitionEvent workflow_transition = 13;
  QuestionEnvelope human_question = 14;
  AnswerEnvelope human_answer = 15;
}

message SubmitHitlAnswerRequest {
  AnswerEnvelope answer = 1;
}

message SubmitHitlAnswerResponse {
  bool accepted = 1;
  string detail = 2;
}

/// Single selectable option in a HITL question.
message QuestionOption {
  string id = 1;
  string label = 2;
  string description = 3;
  bool is_default = 4;
}

/// Validation constraints for answers.
message QuestionConstraints {
  uint32 min_selections = 1;
  uint32 max_selections = 2;
  optional uint32 free_text_max_chars = 3;
}

/// Structured question emitted to UIs / CLI when the agent calls `request_user_input`.
message QuestionEnvelope {
  string question_id = 1;
  string mission_id = 2;
  string session_id = 3;
  uint32 turn_index = 4;
  string text = 5;
  QuestionKind kind = 6;
  repeated QuestionOption options = 7;
  QuestionConstraints constraints = 8;
  // Opaque token (e.g. JWT); clients may show countdown if `expires_at` is set.
  optional string expiry_token = 9;
  bool sensitive = 10;
  optional google.protobuf.Timestamp expires_at = 11;
}

/// Validated human (or system default) response to a question.
message AnswerEnvelope {
  string question_id = 1;
  string mission_id = 2;
  AnswerAuthor answered_by = 3;
  AnswerMode mode = 4;
  repeated string selected_option_ids = 5;
  optional string free_text = 6;
  google.protobuf.Timestamp answered_at = 7;
}

enum TaskPayloadType {
  TASK_PAYLOAD_TYPE_UNSPECIFIED = 0;
  TASK_PAYLOAD_TYPE_GENERAL = 1;
  TASK_PAYLOAD_TYPE_CODE_MODIFICATION = 2;
  TASK_PAYLOAD_TYPE_REVIEW = 3;
  TASK_PAYLOAD_TYPE_RETRIEVAL = 4;
}

enum CompressionMode {
  COMPRESSION_MODE_UNSPECIFIED = 0;
  COMPRESSION_MODE_PLAIN_TEXT = 1;
  COMPRESSION_MODE_TOON = 2;
  COMPRESSION_MODE_METAGLYPH_TOON = 3;
  COMPRESSION_MODE_LATENT_EXPERIMENTAL = 4;
}

enum MetaGlyphOpcode {
  META_GLYPH_OPCODE_UNSPECIFIED = 0;
  META_GLYPH_OPCODE_READ = 1;
  META_GLYPH_OPCODE_PATCH = 2;
  META_GLYPH_OPCODE_TEST = 3;
  META_GLYPH_OPCODE_DEBUG = 4;
}

enum BlockerSeverity {
  BLOCKER_SEVERITY_UNSPECIFIED = 0;
  BLOCKER_SEVERITY_INFO = 1;
  BLOCKER_SEVERITY_WARN = 2;
  BLOCKER_SEVERITY_CRITICAL = 3;
}

message ContextReference {
  string file_path = 1;
  string symbol_path = 2;
  uint32 start_line = 3;
  uint32 end_line = 4;
  string block_id = 5;
}

message TokenUsage {
  string provider = 1;
  uint32 input_tokens = 2;
  uint32 output_tokens = 3;
  uint32 total_tokens = 4;
  uint32 cache_write_tokens = 5;
  uint32 cache_read_tokens = 6;
  uint32 uncached_input_tokens = 7;
  uint32 effective_tokens_saved = 8;
}

message TaskAssignment {
  string task_id = 1;
  string title = 2;
  string description = 3;
  TaskPayloadType task_type = 4;
  repeated string target_files = 5;
  repeated string target_symbols = 6;
  uint32 token_budget = 7;
  ContextPack context_pack = 8;
}

message ProgressUpdate {
  string task_id = 1;
  string stage = 2;
  string message = 3;
  float completion_ratio = 4;
}

message ResultSubmission {
  string task_id = 1;
  bool success = 2;
  PatchEnvelope patch = 3;
  TokenUsage token_usage = 4;
  repeated ContextReference context_references = 5;
  string summary = 6;
  string error_message = 7;
  PatchReceipt patch_receipt = 8;
  string diagnostic_toon = 9;
}

message BlockerAlert {
  string task_id = 1;
  BlockerSeverity severity = 2;
  string message = 3;
  bool retryable = 4;
}

message WorkflowTransitionEvent {
  string task_id = 1;
  string from_state = 2;
  string to_state = 3;
  string reason = 4;
  uint32 retry_count = 5;
  bool terminal = 6;
}

enum PatchFormat {
  PATCH_FORMAT_UNSPECIFIED = 0;
  PATCH_FORMAT_UNIFIED_DIFF_ZERO = 1;
  PATCH_FORMAT_AST_SEARCH_REPLACE = 2;
}

enum PatchApplyStatus {
  PATCH_APPLY_STATUS_UNSPECIFIED = 0;
  PATCH_APPLY_STATUS_APPLIED = 1;
  PATCH_APPLY_STATUS_CONFLICT = 2;
  PATCH_APPLY_STATUS_INVALID = 3;
  PATCH_APPLY_STATUS_STALE_BASE = 4;
}

message ValidationFact {
  string key = 1;
  string value = 2;
}

message SearchReplaceBlock {
  string file_path = 1;
  string symbol_path = 2;
  uint32 start_line = 3;
  uint32 end_line = 4;
  string search = 5;
  string replace = 6;
}

message ContextSpan {
  string file_path = 1;
  uint32 start_line = 2;
  uint32 end_line = 3;
  string symbol_path = 4;
}

message MetaGlyphCommand {
  MetaGlyphOpcode opcode = 1;
  string operand = 2;
}

message ContextPack {
  string id = 1;
  string task_id = 2;
  repeated string target_files = 3;
  repeated string symbols = 4;
  repeated ContextSpan spans = 5;
  string toon_payload = 6;
  string base_revision = 7;
  repeated MetaGlyphCommand meta_glyph_commands = 8;
  CompressionMode compression_mode = 9;
  bytes latent_context = 10;
  string latent_context_handle = 11;
  bytes cryptographic_signature = 12;
  string audit_correlation_id = 13;
}

message PatchEnvelope {
  string task_id = 1;
  repeated string target_files = 2;
  PatchFormat format = 3;
  string patch_text = 4;
  repeated SearchReplaceBlock search_replace_blocks = 5;
  string base_revision = 6;
  repeated ValidationFact validation = 7;
}

message PatchReceipt {
  string task_id = 1;
  PatchApplyStatus status = 2;
  string applied_revision = 3;
  string message = 4;
  repeated string affected_files = 5;
}

message ValidationResult {
  string task_id = 1;
  bool accepted = 2;
  string message = 3;
  repeated ValidationFact facts = 4;
  string diagnostic_toon = 5;
}
