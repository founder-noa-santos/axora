syntax = "proto3";

package provider.v1;

option go_package = "github.com/openakta/aktacode/proto/provider/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";

// ProviderService handles all LLM provider interactions
service ProviderService {
  // Non-streaming execution
  rpc Execute(ProviderRequest) returns (ProviderResponse);
  
  // Streaming execution
  rpc ExecuteStream(ProviderRequest) returns (stream ProviderResponseChunk);
  
  // Model metadata
  rpc GetModelMetadata(ModelMetadataRequest) returns (ModelMetadata);
  
  // Provider health
  rpc HealthCheck(HealthCheckRequest) returns (ProviderHealthStatus);
}

// Execution strategy for local vs hosted routing
enum ExecutionStrategy {
  EXECUTION_STRATEGY_UNSPECIFIED = 0;
  EXECUTION_STRATEGY_LOCAL_ONLY = 1;
  EXECUTION_STRATEGY_HOSTED_ONLY = 2;
  EXECUTION_STRATEGY_LOCAL_WITH_FALLBACK = 3;
  EXECUTION_STRATEGY_HOSTED_WITH_FALLBACK = 4;
  EXECUTION_STRATEGY_INTELLIGENT_ROUTING = 5;
}

// Capability requirements for routing
enum Capability {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_VISION = 1;
  CAPABILITY_FUNCTION_CALLING = 2;
  CAPABILITY_JSON_MODE = 3;
  CAPABILITY_PROMPT_CACHING = 4;
  CAPABILITY_EXTENDED_THINKING = 5;
}

// Main request message
message ProviderRequest {
  // Correlation ID for tracing (required)
  string request_id = 1;
  
  // Tenant identity (extracted from auth, not client-supplied)
  string tenant_id = 2;
  
  // Model selection
  string model = 3;
  ModelSelectionHint model_hint = 4;
  
  // Message structure
  string system_prompt = 5;
  repeated ChatMessage messages = 6;
  
  // Tool/function definitions
  repeated ToolDefinition tools = 7;
  ToolChoice tool_choice = 8;
  
  // Generation parameters
  optional uint32 max_tokens = 9;
  optional float temperature = 10;
  optional float top_p = 11;
  repeated string stop_sequences = 12;
  optional float frequency_penalty = 13;
  optional float presence_penalty = 14;
  
  // Streaming flag
  bool stream = 15;
  
  // Provider-specific extensions (escape hatch)
  map<string, google.protobuf.Value> provider_extensions = 16;
  
  // Capability requirements
  repeated Capability required_capabilities = 17;
  
  // Execution strategy
  ExecutionStrategy execution_strategy = 18;
}

message ModelSelectionHint {
  // Preferred provider type
  string preferred_provider = 1;
  
  // Fallback models in order
  repeated string fallback_models = 2;
  
  // Cost sensitivity (0.0 = cheapest, 1.0 = best quality)
  optional float cost_sensitivity = 3;
}

message ChatMessage {
  string role = 1;  // "system", "user", "assistant", "tool"
  optional string content = 2;
  optional string name = 3;
  repeated ContentPart content_parts = 4;  // For multimodal
  optional ToolCall tool_call = 5;
  optional string tool_call_id = 6;
}

enum ContentPartType {
  CONTENT_PART_TYPE_UNSPECIFIED = 0;
  CONTENT_PART_TYPE_TEXT = 1;
  CONTENT_PART_TYPE_IMAGE_URL = 2;
  CONTENT_PART_TYPE_IMAGE_BASE64 = 3;
}

message ContentPart {
  ContentPartType type = 1;
  optional string text = 2;
  optional string image_url = 3;
  optional string image_base64 = 4;
  optional string mime_type = 5;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters = 3;  // JSON Schema
  bool strict = 4;
}

message ToolCall {
  string id = 1;
  string name = 2;
  string arguments = 3;  // JSON string
}

enum ToolChoice {
  TOOL_CHOICE_UNSPECIFIED = 0;
  TOOL_CHOICE_NONE = 1;
  TOOL_CHOICE_AUTO = 2;
  TOOL_CHOICE_REQUIRED = 3;
}

// Response message
message ProviderResponse {
  string request_id = 1;
  string response_id = 2;
  string model = 3;
  string provider = 4;
  
  string content = 5;
  repeated ToolCall tool_calls = 6;
  
  StopReason stop_reason = 7;
  optional string stop_sequence = 8;
  
  TokenUsage usage = 9;
  ProviderMetadata provider_metadata = 10;
  
  google.protobuf.Duration latency = 11;
  repeated string warnings = 12;
}

enum StopReason {
  STOP_REASON_UNSPECIFIED = 0;
  STOP_REASON_STOP = 1;
  STOP_REASON_LENGTH = 2;
  STOP_REASON_TOOL_CALL = 3;
  STOP_REASON_CONTENT_FILTER = 4;
  STOP_REASON_ERROR = 5;
}

message TokenUsage {
  uint32 input_tokens = 1;
  uint32 output_tokens = 2;
  uint32 total_tokens = 3;
  
  optional uint32 cache_write_tokens = 4;
  optional uint32 cache_read_tokens = 5;
  
  optional double cost_usd = 6;
}

message ProviderMetadata {
  map<string, string> cache_receipts = 1;
  map<string, google.protobuf.Value> extensions = 2;
}

// Streaming chunk
message ProviderResponseChunk {
  string request_id = 1;
  uint32 chunk_index = 2;
  
  optional string content_delta = 3;
  optional ToolCallDelta tool_call_delta = 4;
  
  optional TokenUsage usage = 5;
  optional StopReason stop_reason = 6;
  optional ProviderMetadata provider_metadata = 7;
}

message ToolCallDelta {
  optional string index = 1;
  optional string id = 2;
  optional string name = 3;
  optional string arguments_delta = 4;
}

// Model metadata
message ModelMetadataRequest {
  string model_id = 1;
}

message ModelMetadata {
  string model_id = 1;
  string provider = 2;
  
  uint32 context_window = 3;
  repeated Capability capabilities = 4;
  
  optional Pricing pricing = 5;
  optional ModelLimits limits = 6;
  
  bool supports_streaming = 7;
  bool supports_function_calling = 8;
  bool supports_vision = 9;
}

message Pricing {
  double input_token_cost_usd = 1;
  double output_token_cost_usd = 2;
}

message ModelLimits {
  uint32 max_tokens = 1;
  uint32 max_image_size_mb = 2;
  uint32 max_tools = 3;
}

// Health check
message HealthCheckRequest {
  string provider = 1;
}

message ProviderHealthStatus {
  string provider = 1;
  HealthStatus status = 2;
  
  optional string last_error = 3;
  google.protobuf.Duration latency_p99 = 4;
  
  google.protobuf.Timestamp last_checked_at = 5;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_DEGRADED = 2;
  HEALTH_STATUS_UNHEALTHY = 3;
}

// Error codes
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_REQUEST = 1;
  ERROR_CODE_QUOTA_EXCEEDED = 2;
  ERROR_CODE_PROVIDER_UNAVAILABLE = 3;
  ERROR_CODE_AUTH_FAILED = 4;
  ERROR_CODE_RATE_LIMITED = 5;
  ERROR_CODE_CONTENT_FILTER = 6;
  ERROR_CODE_STREAM_INTERRUPTED = 7;
  ERROR_CODE_INTERNAL = 8;
}

message Error {
  ErrorCode code = 1;
  string message = 2;
  map<string, string> details = 3;
}

// EmbeddingService handles embedding generation
service EmbeddingService {
  // Single embedding
  rpc Embed(EmbedRequest) returns (EmbedResponse);
  
  // Batch embedding
  rpc EmbedBatch(BatchEmbedRequest) returns (BatchEmbedResponse);
  
  // List available embedding providers
  rpc ListProviders(ListEmbedProvidersRequest) returns (ListEmbedProvidersResponse);
  
  // Get provider status
  rpc GetProviderStatus(GetProviderStatusRequest) returns (EmbedProviderStatus);
}

// Embedding request
message EmbedRequest {
  string text = 1;
  optional string model = 2;
  ExecutionStrategy execution_strategy = 3;
}

// Batch embedding request
message BatchEmbedRequest {
  repeated string texts = 1;
  optional string model = 2;
  ExecutionStrategy execution_strategy = 3;
}

// Embedding response
message EmbedResponse {
  repeated float embedding = 1;
  string model = 2;
  string provider = 3;
  uint32 dimensions = 4;
  google.protobuf.Duration latency = 5;
}

// Batch embedding response
message BatchEmbedResponse {
  repeated Embedding embeddings = 1;
  string model = 2;
  string provider = 3;
  uint32 dimensions = 4;
  google.protobuf.Duration total_latency = 5;
  uint32 count = 6;
}

message Embedding {
  repeated float vector = 1;
  uint32 dimensions = 2;
}

// Provider listing
message ListEmbedProvidersRequest {}

message ListEmbedProvidersResponse {
  repeated EmbedProviderInfo providers = 1;
}

message EmbedProviderInfo {
  string provider = 1;
  string name = 2;
  string description = 3;
  string status = 4;
  uint32 dimensions = 5;
  uint32 max_input_length = 6;
  bool supports_batch = 7;
}

// Provider status
message GetProviderStatusRequest {
  string provider = 1;
}

message EmbedProviderStatus {
  string provider = 1;
  string status = 2;
  uint32 dimensions = 3;
  optional string last_error = 4;
  google.protobuf.Timestamp last_checked_at = 5;
}
